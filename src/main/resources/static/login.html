<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beetles</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login/style.css">
</head>

<body>
    <header id="abatopo">
        <a href="index.html">
            <img src="elements/logo-ctjs.png" alt="Logo da Academia">
        </a>
    </header>
    <div id="container">
        <section id="card-login">
            <h2>Login</h2>
            <form>
                <p>Email:</p>
                <input type="text" id="inEmail">
                <p>Senha:</p>
                <input type="password" id="inSenha">
                <input type="submit" value="Login" id="btnLogin">
            </form>
        </section>
        <p id="instRegistro">Problemas na entrada?<br>Entre em contato:</p>
        <section id="contatos">
            <btn id="btnInstagram">
                <a href="">Instagram</a>
                <img id="logoWhatsapp" src="elements/logo-instagram.png" alt="whatsapp">
            </btn>
            <btn id="btnWhatsapp">
                <a href="">Whatsapp</a>
                <img id="logoWhatsapp" src="elements/logo-whatsapp.png" alt="whatsapp">
            </btn>
        </section>
        <p id="instRegistro">Esqueceu a senha? <a href="alterarSenha.html" id="altsenha">Redefinir</a></p>
        <img id="background" src="elements/lgn-bg.jpg" alt="background">
    </div>
    <footer>
        <p>© CTJS Fight - 2026 - Todos os direitos reservados</p>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
