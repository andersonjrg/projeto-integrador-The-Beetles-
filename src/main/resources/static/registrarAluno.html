<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Essa página deve conter os inputs para o dono registrar novos alunos na lista -->
    <h1>Registrar Aluno</h1>
    <form>
        <p>Nome:</p>
        <input id="inNome" type="text">
        <p>Plano:</p>
        <select id="plano" name="plano">
            <option value="plano1">Plano 1</option>
            <option value="plano2">Plano 2</option>
            <option value="plano3">Plano 3</option>
        </select>
        <br>
        <p>Status:</p>
        <select name="status" id="status">
            <option value="PENDENTE">Pendente</option>
            <option value="PAGO">Pago</option>
            <option value="ATRASADO">Atrasado</option>
            <option value="CANCELADO">Cancelado</option>
        </select>
        <br>
        <input type="submit" value="Salvar Aluno">
        <script src="js/auth.js"></script>
        <script src="js/api.js"></script>
        <script src="js/registrarAluno.js"></script>
    </form>
</body>

</html>
