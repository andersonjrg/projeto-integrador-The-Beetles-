<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beetles</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/alterarSenha/style.css">
</head>

<body>
    <header id="abatopo">
        <a href="index.html">
            <img src="elements/logo-beetles.png" alt="Logo da Academia">
        </a>
    </header>
    <div id="container">
        <section id="card-login">
            <h2>Alterar Senha</h2>
            <form>
                <p>Email:</p>
                <input type="text" id="inEmail">
                <p>Nova Senha:</p>
                <input type="password" id="inSenhaNova">
                <input id="btnSenha" type="submit" value="Alterar Senha">
            </form>
        </section>
        <p id="instDuvida">Dúvidas?<br>Entre em contato:</p>
        <section id="contatos">
            <btn id="btnInstagram">
                <a href="">Instagram</a>
                <img id="logoWhatsapp" src="elements/logo-instagram.png" alt="whatsapp">
            </btn>
            <btn id="btnWhatsapp">
                <a href="">Whatsapp</a>
                <img id="logoWhatsapp" src="elements/logo-whatsapp.png" alt="whatsapp">
            </btn>
        </section>
        <a href="login.html" id="instDuvida">Retornar a área de login</a>
        <img id="background" src="elements/snh-bg.jpg" alt="background">
    </div>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/alterarSenha.js"></script>
</body>

</html>
