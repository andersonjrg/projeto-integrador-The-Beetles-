spring.application.name=System Payout

spring.jpa.hibernate.ddl-auto=validate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL_POSTGRES}
spring.datasource.username=${DB_USER_POSTGRES}
spring.datasource.password=${DB_PASSWORD_POSTGRES}

resilience4j.ratelimiter.instances.adminRateLimiter.for-period=20
resilience4j.ratelimiter.instances.adminRateLimiter.refresh-period=10s
resilience4j.ratelimiter.instances.adminRateLimiter.timeout-duration=2s

resilience4j.ratelimiter.instances.alunoRateLimiter.for-period=10
resilience4j.ratelimiter.instances.alunoRateLimiter.refresh-period=5s
resilience4j.ratelimiter.instances.alunoRateLimiter.timeout-duration=1s

resilience4j.ratelimiter.instances.historicoRateLimiter.for-period=10
resilience4j.ratelimiter.instances.historicoRateLimiter.refresh-period=5s
resilience4j.ratelimiter.instances.historicoRateLimiter.timeout-duration=1s

resilience4j.ratelimiter.instances.planoRateLimiter.for-period=10
resilience4j.ratelimiter.instances.planoRateLimiter.refresh-period=5s
resilience4j.ratelimiter.instances.planoRateLimiter.timeout-duration=1s

resilience4j.ratelimiter.instances.securityRateLimiter.for-period=10
resilience4j.ratelimiter.instances.securityRateLimiter.refresh-period=5s
resilience4j.ratelimiter.instances.securityRateLimiter.timeout-duration=1s

server.port=${PORT:8080}
JWT_SECRET=${JWT_SECRET}

spring.flyway.enabled=true
spring.flyway.schemas=public
spring.flyway.locations=classpath:db.migration
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

spring.jpa.open-in-view=false
spring.jpa.show-sql=true

server.error.include-exception=false