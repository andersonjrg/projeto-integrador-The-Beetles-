spring.application.name=System Payout

spring.jpa.hibernate.dll-auto=validate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL_POSTGRES}
spring.datasource.username=${DB_USER_POSTGRES}
spring.datasource.password=${DB_PASSWORD_POSTGRES}

server.port=${PORT:8080}
JWT_SECRET=${JWT_SECRET}

spring.flyway.enabled=true
spring.flyway.schemas=public
spring.flyway.locations=classpath:db.migration
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

spring.jpa.open-in-view=false
spring.jpa.show-sql=true

server.error.include-exception=false